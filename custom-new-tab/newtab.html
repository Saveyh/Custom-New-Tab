<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Navigateur</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <form id="searchForm" class="smart-search" autocomplete="off">
          <span class="search-glyph" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m16.2 16.2 4.3 4.3"></path>
            </svg>
          </span>

          <input
            id="searchInput"
            name="query"
            type="search"
            placeholder="Search Google..."
            autocomplete="off"
            spellcheck="false"
            autofocus
          />

          <div id="enginePicker" class="engine-picker">
            <button
              id="engineButton"
              class="engine-button"
              type="button"
              aria-haspopup="listbox"
              aria-expanded="false"
              aria-label="Choisir le moteur de recherche"
            ></button>
            <div
              id="engineMenu"
              class="engine-menu"
              role="listbox"
              aria-label="Moteur de recherche"
              hidden
            ></div>
          </div>

          <button class="submit-button" type="submit" aria-label="Lancer la recherche">
            <svg viewBox="0 0 24 24" focusable="false">
              <path d="M5 12h13"></path>
              <path d="m13 6 6 6-6 6"></path>
            </svg>
          </button>
        </form>

        <div class="toolbar" aria-label="Actions">
          <button
            id="editToggle"
            class="icon-button"
            type="button"
            aria-label="Activer l'edition"
            title="Edition"
          ></button>
          <button
            class="icon-button"
            type="button"
            data-action="add-section"
            aria-label="Ajouter une ligne"
            title="Ajouter une ligne"
          ></button>
        </div>
      </header>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>

      <main id="sectionsRoot" class="sections" aria-label="Liens rapides"></main>
    </div>

    <dialog id="editorDialog" class="dialog">
      <form id="editorForm" class="dialog-panel" method="dialog" novalidate>
        <div class="dialog-header">
          <h2 id="dialogTitle">Modifier</h2>
          <button
            id="dialogClose"
            class="icon-button"
            type="button"
            aria-label="Fermer"
            title="Fermer"
          ></button>
        </div>

        <div id="dialogFields" class="dialog-fields"></div>
        <p id="formError" class="form-error" role="alert"></p>

        <div class="dialog-actions">
          <button id="dialogCancel" class="text-button" type="button">Annuler</button>
          <button id="dialogSubmit" class="text-button text-button-primary" type="submit">
            Enregistrer
          </button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
