<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>&#8288;</title>
    <link
      rel="icon"
      media="(prefers-color-scheme: dark)"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><path d="M32 14v36M14 32h36" fill="none" stroke="%23ffffff" stroke-width="6" stroke-linecap="round"/></svg>'
    />
    <link
      rel="icon"
      media="(prefers-color-scheme: light)"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><path d="M32 14v36M14 32h36" fill="none" stroke="%23000000" stroke-width="6" stroke-linecap="round"/></svg>'
    />
    <link
      rel="icon"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><path d="M32 14v36M14 32h36" fill="none" stroke="%23ffffff" stroke-width="6" stroke-linecap="round"/></svg>'
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="dashboard-nav-group">
          <nav id="dashboardNav" class="dashboard-nav" aria-label="Dashboards"></nav>
          <div
            id="dashboardNavActions"
            class="dashboard-nav-actions"
            aria-label="Actions dashboard"
          ></div>
        </div>

        <div class="toolbar" aria-label="Actions">
          <button
            id="editToggle"
            class="icon-button"
            type="button"
            aria-label="Activer l'edition"
            title="Edition"
          ></button>
          <button
            class="icon-button"
            type="button"
            data-action="add-widget"
            aria-label="Ajouter un widget"
            title="Ajouter un widget"
          ></button>
        </div>
      </header>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>

      <main id="sectionsRoot" class="sections" aria-label="Liens rapides"></main>
    </div>

    <dialog id="editorDialog" class="dialog">
      <form id="editorForm" class="dialog-panel" method="dialog" novalidate>
        <div class="dialog-header">
          <h2 id="dialogTitle">Modifier</h2>
          <button
            id="dialogClose"
            class="icon-button"
            type="button"
            aria-label="Fermer"
            title="Fermer"
          ></button>
        </div>

        <div id="dialogFields" class="dialog-fields"></div>
        <p id="formError" class="form-error" role="alert"></p>

        <div class="dialog-actions">
          <button id="dialogCancel" class="text-button" type="button">Annuler</button>
          <button id="dialogSubmit" class="text-button text-button-primary" type="submit">
            Enregistrer
          </button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
